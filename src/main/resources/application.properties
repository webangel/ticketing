spring.application.name=springboot-crud

# src/main/resources/application.properties

# Configuración de MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ticketing_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Opcional: Para ver las consultas con parámetros
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# Validación
spring.mvc.static-path-pattern=/static/**

# Habilita mensajes de validación detallados
server.error.include-message=always
server.error.include-binding-errors=always

# JWT
jwt.secret=DwkdopIDAISOPDQWD59AS8D9AWD2ASD9sd59qwd
# 1 día en milisegundos
jwt.expiration-ms=86400000