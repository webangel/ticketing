spring.application.name=springboot-crud

# MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ticketing_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Validation
server.error.include-message=always
server.error.include-binding-errors=always

# JWT
jwt.secret=${JWT_SECRET:DwkdopIDAISOPDQWD59AS8D9AWD2ASD9sd59qwd}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Swagger/OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=com.scalar.ticketing.app.springboot_crud.interfaces.controller

# PDF Generation
app.pdf.output-directory=${APP_PDF_OUTPUT_DIRECTORY:./pdf-tickets}

# Email Configuration
app.email.from=${APP_EMAIL_FROM:noreply@ticketing.com}
app.email.enabled=${APP_EMAIL_ENABLED:false}

# SMTP
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Async Support
spring.task.scheduling.pool.size=2
